<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول - ملوك النزاهة</title>

<link rel="icon" type="image/png"
href="https://i.postimg.cc/hP9Y9djm/IMG-20260510-WA0000.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    background:
    linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}

body::before{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-250px;
    left:-250px;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
    bottom:-200px;
    right:-200px;
}

.login-container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:430px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:35px;
    padding:40px 30px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo-box{
    text-align:center;
    margin-bottom:30px;
}

.logo-img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid rgba(255,255,255,.4);
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.logo-box h1{
    color:white;
    font-size:34px;
    margin-bottom:8px;
    font-weight:800;
}

.logo-box p{
    color:rgba(255,255,255,.85);
    font-size:15px;
}

.input-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:10px;
    color:white;
    font-weight:700;
    font-size:15px;
}

.input-box{
    position:relative;
}

.input-box span{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    right:15px;
    font-size:20px;
}

input{
    width:100%;
    padding:15px 50px 15px 15px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,.2);
    color:white;
    font-size:16px;
    font-family:'Cairo',sans-serif;
    transition:.3s;
}

input::placeholder{
    color:rgba(255,255,255,.7);
}

input:focus{
    outline:none;
    background:rgba(255,255,255,.3);
    transform:translateY(-2px);
}

button{
    width:100%;
    border:none;
    padding:16px;
    border-radius:18px;
    background:white;
    color:#667eea;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
    font-family:'Cairo',sans-serif;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.error{
    background:rgba(255,0,0,.15);
    border:1px solid rgba(255,255,255,.2);
    color:white;
    padding:14px;
    border-radius:15px;
    margin-bottom:20px;
    text-align:center;
    font-weight:600;
}

.footer-text{
    margin-top:25px;
    text-align:center;
    color:rgba(255,255,255,.8);
    font-size:14px;
    line-height:1.8;
}

@media (max-width: 992px){

.login-container{
    max-width:450px;
    padding:35px 25px;
}

.logo-box h1{
    font-size:30px;
}

}

@media (max-width: 768px){

body{
    padding:20px;
}

.login-container{
    width:100%;
    max-width:100%;
    border-radius:25px;
    padding:30px 22px;
}

.logo-img{
    width:85px;
    height:85px;
}

.logo-box h1{
    font-size:26px;
}

.logo-box p{
    font-size:14px;
}

input{
    padding:14px 45px 14px 14px;
    font-size:15px;
}

button{
    padding:14px;
    font-size:16px;
}

.footer-text{
    font-size:13px;
}

}

@media (max-width: 480px){

body{
    align-items:center;
    padding:15px;
}

.login-container{
    padding:25px 18px;
    border-radius:22px;
}

.logo-img{
    width:75px;
    height:75px;
}

.logo-box h1{
    font-size:23px;
}

.logo-box p{
    font-size:13px;
}

label{
    font-size:14px;
}

input{
    font-size:14px;
    border-radius:14px;
}

button{
    font-size:15px;
    border-radius:14px;
}

.error{
    font-size:13px;
    padding:12px;
}

}

@media (max-width: 360px){

.login-container{
    padding:22px 15px;
}

.logo-box h1{
    font-size:20px;
}

.logo-img{
    width:65px;
    height:65px;
}

input{
    padding:12px 40px 12px 12px;
}

button{
    padding:12px;
}

}

</style>

</head>

<body>

<div class="login-container">

<div class="logo-box">

<img
src="https://i.postimg.cc/hP9Y9djm/IMG-20260510-WA0000.jpg"
class="logo-img">

<h1>ملوك النزاهة</h1>

<p>
لوحة التحكم الخاصة بالإدارة
</p>

</div>

<div id="errorMsg"
class="error"
style="display:none;">
</div>

<form id="loginForm">

<div class="input-group">

<label>
👤 اسم المستخدم
</label>

<div class="input-box">

<span>👤</span>

<input
type="text"
id="username"
placeholder="أدخل اسم المستخدم"
required>

</div>

</div>

<div class="input-group">

<label>
🔒 كلمة المرور
</label>

<div class="input-box">

<span>🔒</span>

<input
type="password"
id="password"
placeholder="أدخل كلمة المرور"
required>

</div>

</div>

<button type="submit">

🚪 تسجيل الدخول

</button>

</form>

<div class="footer-text">

<p>
© جميع الحقوق محفوظة 2026
</p>

<p>
ملوك النزاهة
</p>

</div>

</div>

<script>

const API_URL = window.location.origin;

document.getElementById('loginForm')
.addEventListener('submit', async (e) => {

e.preventDefault();

const username =
document.getElementById('username').value;

const password =
document.getElementById('password').value;

try{

const response =
await fetch(`${API_URL}/api/login`, {

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
username,
password
})

});

const data = await response.json();

if(response.ok){

localStorage.setItem('token', data.token);

window.location.href='/dashboard';

}else{

showError(
data.message ||
'❌ اسم المستخدم أو كلمة المرور غير صحيحة'
);

}

}catch(error){

showError(
'⚠️ حدث خطأ في الاتصال بالخادم'
);

}

});

function showError(message){

const errorDiv =
document.getElementById('errorMsg');

errorDiv.textContent = message;

errorDiv.style.display = 'block';

setTimeout(() => {

errorDiv.style.display = 'none';

},3000);

}

</script>

</body>
</html>
